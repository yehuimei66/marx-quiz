<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马原期末复习 - 答题练习</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: #f0f2f5;
    color: #333;
    min-height: 100vh;
  }
  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 16px;
  }
  /* Header */
  .header {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: #fff;
    padding: 20px 24px;
    border-radius: 14px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header .stats { font-size: 13px; opacity: .9; display: flex; gap: 16px; }
  .header .stats span { white-space: nowrap; }

  /* Mode switch */
  .mode-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all .2s;
    text-align: center;
  }
  .mode-btn.active {
    border-color: #c0392b;
    background: #fff5f3;
    color: #c0392b;
  }
  .mode-btn .badge {
    display: inline-block;
    background: #eee;
    color: #666;
    border-radius: 10px;
    padding: 0 8px;
    font-size: 12px;
    margin-left: 4px;
  }
  .mode-btn.active .badge {
    background: #c0392b;
    color: #fff;
  }

  /* Progress */
  .progress-area {
    background: #fff;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 6px;
    background: #eee;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: linear-gradient(90deg, #e74c3c, #c0392b);
    border-radius: 3px;
    transition: width .3s;
  }

  /* Question card */
  .q-card {
    background: #fff;
    border-radius: 14px;
    padding: 24px 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    min-height: 360px;
    display: flex;
    flex-direction: column;
  }
  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .q-number {
    font-size: 15px;
    font-weight: 700;
    color: #c0392b;
  }
  .q-type-tag {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 20px;
    background: #fce8e5;
    color: #c0392b;
    font-weight: 600;
  }
  .q-type-tag.multi { background: #e8f0fe; color: #1a73e8; }
  .q-text {
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 20px;
    color: #222;
  }
  .q-text .blanks { color: #c0392b; font-weight: 700; }

  /* Options */
  .options { flex: 1; }
  .option {
    display: flex;
    align-items: flex-start;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 2px solid #eee;
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .option:hover { border-color: #ccc; background: #fafafa; }
  .option.selected {
    border-color: #c0392b;
    background: #fff5f3;
  }
  .option.correct {
    border-color: #27ae60;
    background: #eafaf1;
  }
  .option.wrong {
    border-color: #e74c3c;
    background: #fdedec;
  }
  .option.reveal {
    border-color: #27ae60;
    background: #eafaf1;
  }
  .option-label {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    border-radius: 50%;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    margin-right: 12px;
    transition: all .15s;
  }
  .option.selected .option-label { background: #c0392b; color: #fff; }
  .option.correct .option-label { background: #27ae60; color: #fff; }
  .option.wrong .option-label { background: #e74c3c; color: #fff; }
  .option.reveal .option-label { background: #27ae60; color: #fff; }
  .option-text { font-size: 15px; line-height: 1.5; padding-top: 3px; }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: #c0392b; color: #fff; }
  .btn-primary:hover { background: #a93226; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-outline {
    background: #fff;
    color: #666;
    border: 2px solid #ddd;
  }
  .btn-outline:hover { border-color: #c0392b; color: #c0392b; }
  .btn-success { background: #27ae60; color: #fff; }
  .btn-success:hover { background: #219a52; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-info { background: #3498db; color: #fff; }
  .btn-info:hover { background: #2980b9; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }

  /* Result */
  .result-box {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    display: none;
  }
  .result-box.show { display: block; }
  .result-box.correct { background: #eafaf1; color: #27ae60; border: 1px solid #a3d9b1; }
  .result-box.wrong { background: #fdedec; color: #e74c3c; border: 1px solid #f5b7b1; }
  .result-box .answer-detail { font-weight: 400; font-size: 13px; margin-top: 4px; color: #666; }

  /* Question grid */
  .grid-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .grid-overlay.show { display: flex; }
  .grid-panel {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 90%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
  }
  .grid-panel h3 { margin-bottom: 14px; font-size: 16px; }
  .grid-nums {
    display: grid;
    grid-template-columns: repeat(auto-fill, 40px);
    gap: 6px;
  }
  .grid-nums .gnum {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    border: 2px solid #eee;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .grid-nums .gnum:hover { border-color: #c0392b; }
  .grid-nums .gnum.current { border-color: #c0392b; background: #fff5f3; color: #c0392b; }
  .grid-nums .gnum.answered { background: #eafaf1; border-color: #27ae60; color: #27ae60; }
  .grid-nums .gnum.wrong-q { background: #fdedec; border-color: #e74c3c; color: #e74c3c; }

  /* View mode bar */
  .view-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .view-btn {
    flex: 1;
    padding: 8px 6px;
    border: 2px solid #ddd;
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all .2s;
    text-align: center;
  }
  .view-btn.active {
    border-color: #c0392b;
    background: #fff5f3;
    color: #c0392b;
  }
  .view-btn .badge {
    display: inline-block;
    background: #eee;
    color: #666;
    border-radius: 10px;
    padding: 0 7px;
    font-size: 11px;
    margin-left: 3px;
  }
  .view-btn.active .badge { background: #c0392b; color: #fff; }

  /* Star button */
  .star-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 0 4px;
    transition: transform .2s;
    line-height: 1;
  }
  .star-btn:hover { transform: scale(1.2); }
  .star-btn.starred { color: #f39c12; }
  .star-btn:not(.starred) { color: #ccc; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #999;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Author / Footer */
  .footer {
    text-align: center;
    padding: 20px;
    margin-top: 20px;
    color: #aaa;
    font-size: 13px;
    border-top: 1px solid #eee;
  }
  .footer a {
    color: #c0392b;
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }
  .footer .email-link { font-weight: 600; }

  /* Clear button */
  .btn-clear {
    background: #fff;
    color: #e74c3c;
    border: 2px solid #e74c3c;
  }
  .btn-clear:hover { background: #fdedec; }

  /* Keyboard hint */
  .kb-hint {
    text-align: center;
    font-size: 12px;
    color: #aaa;
    margin-top: 12px;
    padding: 8px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .app { padding: 10px; }
    .header { flex-direction: column; gap: 8px; text-align: center; }
    .header h1 { font-size: 17px; }
    .q-card { padding: 16px 18px; }
    .q-text { font-size: 15px; }
    .actions { gap: 6px; }
    .btn { padding: 8px 14px; font-size: 13px; flex: 1; justify-content: center; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <h1>📚 马原期末复习</h1>
    <div class="stats">
      <span>✅ 正确: <b id="correctCount">0</b></span>
      <span>❌ 错误: <b id="wrongCount">0</b></span>
      <span>📊 <b id="doneCount">0</b>/300</span>
      <span title="进度已自动保存到浏览器">💾</span>
    </div>
  </div>

  <!-- Mode bar -->
  <div class="mode-bar">
    <div class="mode-btn active" data-mode="single" onclick="switchMode('single')">
      单选题 <span class="badge">200</span>
    </div>
    <div class="mode-btn" data-mode="multiple" onclick="switchMode('multiple')">
      多选题 <span class="badge">100</span>
    </div>
  </div>

  <!-- View mode bar -->
  <div class="view-bar">
    <div class="view-btn active" data-view="normal" onclick="switchView('normal')">
      📖 全部题目
    </div>
    <div class="view-btn" data-view="wrongbook" onclick="switchView('wrongbook')">
      ❌ 错题本 <span class="badge" id="wrongCountBadge">0</span>
    </div>
    <div class="view-btn" data-view="starred" onclick="switchView('starred')">
      ⭐ 收藏题 <span class="badge" id="starredCountBadge">0</span>
    </div>
  </div>
  <div class="progress-area">
    <div class="progress-text">
      <span id="progressLabel">第 1 题</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- Question card -->
  <div class="q-card" id="qCard">
    <div class="q-header">
      <span class="q-number" id="qNumber">第 1 题</span>
      <div>
        <button class="star-btn" id="starBtn" onclick="toggleStar()" title="收藏此题">☆</button>
        <span class="q-type-tag" id="qTypeTag">单选题</span>
      </div>
    </div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="result-box" id="resultBox"></div>
    <div class="actions" id="actionsContainer">
      <button class="btn btn-outline" onclick="prevQuestion()">◀ 上一题</button>
      <button class="btn btn-outline" onclick="showGrid()">📋 题号</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">✓ 确认答案</button>
      <button class="btn btn-outline" onclick="nextQuestion()">下一题 ▶</button>
    </div>
    <div class="kb-hint">⌨️ 按 A/B/C/D 选择 · Enter 确认 · ← → 翻页</div>
  </div>
</div>

<!-- Question grid overlay -->
<div class="grid-overlay" id="gridOverlay">
  <div class="grid-panel">
    <h3>📋 题号导航 <span style="font-size:13px;color:#888;font-weight:400;" id="gridModeLabel">(单选题)</span></h3>
    <div class="grid-nums" id="gridNums"></div>
    <div style="margin-top:14px;text-align:right;">
      <button class="btn btn-primary btn-sm" onclick="hideGrid()">关闭</button>
    </div>
  </div>
</div>

let currentMode = 'single';
let currentView = 'normal';  // 'normal' | 'wrongbook' | 'starred'
let currentIndex = 0;
let userAnswers = {};   // { qid: 'A' or ['A','B'] }
let results = {};       // { qid: 'correct' | 'wrong' }
let submittedIds = new Set();
let wrongSet = new Set();   // 错题本 - question IDs answered wrong
let starredSet = new Set(); // 收藏题 - manually bookmarked IDs

// ===== 本地存储 =====
function saveState() {
  try {
    const state = {
      currentMode,
      currentView,
      currentIndex,
      userAnswers,
      results,
      submittedIds: [...submittedIds],
      wrongSet: [...wrongSet],
      starredSet: [...starredSet]
    };
    localStorage.setItem('marx_quiz_state', JSON.stringify(state));
  } catch(e) { /* ignore storage errors */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem('marx_quiz_state');
    if (!raw) return;
    const state = JSON.parse(raw);
    if (state.currentMode) currentMode = state.currentMode;
    if (state.currentView) currentView = state.currentView;
    if (typeof state.currentIndex === 'number') currentIndex = state.currentIndex;
    if (state.userAnswers) userAnswers = state.userAnswers;
    if (state.results) results = state.results;
    if (state.submittedIds) submittedIds = new Set(state.submittedIds);
    if (state.wrongSet) wrongSet = new Set(state.wrongSet);
    if (state.starredSet) starredSet = new Set(state.starredSet);
  } catch(e) { /* ignore load errors */ }
}

function getFilteredQuestions() {
  let list = allQuestions.filter(q => q.type === currentMode);
  if (currentView === 'wrongbook') {
    list = list.filter(q => wrongSet.has(q.id));
  } else if (currentView === 'starred') {
    list = list.filter(q => starredSet.has(q.id));
  }
  return list;
}

function getCurrentQ() {
  const list = getFilteredQuestions();
  return list[currentIndex];
}

// ===== RENDER =====
function render() {
  const list = getFilteredQuestions();

  // Update header stats
  let correct = 0, wrong = 0;
  Object.keys(results).forEach(id => {
    if (results[id] === 'correct') correct++;
    if (results[id] === 'wrong') wrong++;
  });
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('doneCount').textContent = correct + wrong;
  document.getElementById('wrongCountBadge').textContent = wrongSet.size;
  document.getElementById('starredCountBadge').textContent = starredSet.size;

  // Empty state for wrongbook/starred
  if (list.length === 0) {
    document.getElementById('progressLabel').textContent = currentView === 'wrongbook' ? '错题本 - 暂无错题 🎉' : currentView === 'starred' ? '收藏题 - 暂无收藏' : '暂无题目';
    document.getElementById('progressPct').textContent = '0%';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('qNumber').textContent = '';
    document.getElementById('qText').innerHTML = '';
    document.getElementById('optionsContainer').innerHTML = '';
    document.getElementById('resultBox').className = 'result-box';
    document.getElementById('resultBox').innerHTML = '';
    document.getElementById('submitBtn').textContent = '✓ 确认答案';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('starBtn').style.display = 'none';
    updateGrid();
    // Show empty state message
    const container = document.getElementById('optionsContainer');
    const msg = document.createElement('div');
    msg.className = 'empty-state';
    if (currentView === 'wrongbook') {
      msg.innerHTML = '<div class="icon">🎉</div><p>错题本为空！所有题目都答对了。</p>';
    } else if (currentView === 'starred') {
      msg.innerHTML = '<div class="icon">⭐</div><p>还没有收藏题目，做题时点击题目旁的星标即可收藏。</p>';
    }
    container.appendChild(msg);
    return;
  }

  const q = list[currentIndex];
  if (!q) {
    currentIndex = 0;
    render();
    return;
  }

  // Progress
  const total = list.length;
  document.getElementById('progressLabel').textContent = `第 ${currentIndex + 1} 题 / 共 ${total} 题`;
  const pct = Math.round(((currentIndex + 1) / total) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // Question header
  document.getElementById('qNumber').textContent = `第 ${q.id} 题`;
  // Star button
  const starBtn = document.getElementById('starBtn');
  starBtn.style.display = 'inline';
  if (starredSet.has(q.id)) {
    starBtn.textContent = '★';
    starBtn.classList.add('starred');
  } else {
    starBtn.textContent = '☆';
    starBtn.classList.remove('starred');
  }
  const tag = document.getElementById('qTypeTag');
  tag.textContent = q.type === 'single' ? '单选题' : '多选题';
  tag.className = 'q-type-tag' + (q.type === 'multiple' ? ' multi' : '');

  // Question text - replace blanks with styled version
  let qText = q.question;
  document.getElementById('qText').innerHTML = qText;

  // Options
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.label = opt.label;
    div.onclick = () => selectOption(opt.label);

    // Check if this option is selected
    const answered = userAnswers[q.id];
    if (answered) {
      if (q.type === 'single' && answered === opt.label) {
        div.classList.add('selected');
      } else if (q.type === 'multiple' && Array.isArray(answered) && answered.includes(opt.label)) {
        div.classList.add('selected');
      }
    }

    // If submitted, show correct/wrong
    if (submittedIds.has(q.id)) {
      const correctAnswer = allAnswers[q.id];
      let isCorrectOption = false;
      if (q.type === 'single') {
        isCorrectOption = opt.label === correctAnswer;
      } else {
        isCorrectOption = correctAnswer.includes(opt.label);
      }

      if (isCorrectOption) {
        div.classList.add('correct');
      }
      if (answered) {
        if (q.type === 'single' && answered === opt.label && answered !== correctAnswer) {
          div.classList.add('wrong');
        } else if (q.type === 'multiple' && Array.isArray(answered) && answered.includes(opt.label) && !correctAnswer.includes(opt.label)) {
          div.classList.add('wrong');
        }
      }
      // Also show selected but wrong
      if (q.type === 'single' && div.classList.contains('selected') && !div.classList.contains('correct')) {
        div.classList.add('wrong');
      }
    }

    div.innerHTML = `
      <span class="option-label">${opt.label}</span>
      <span class="option-text">${opt.text}</span>
    `;
    container.appendChild(div);
  });

  // Result box
  const resultBox = document.getElementById('resultBox');
  if (submittedIds.has(q.id)) {
    const r = results[q.id];
    resultBox.className = 'result-box show ' + r;
    const correctAnswer = allAnswers[q.id];
    if (r === 'correct') {
      resultBox.innerHTML = '✅ 回答正确！';
    } else {
      resultBox.innerHTML = `❌ 回答错误<br><span class="answer-detail">正确答案：${correctAnswer}</span>`;
    }
  } else {
    resultBox.className = 'result-box';
    resultBox.innerHTML = '';
  }

  // Submit button state
  const submitBtn = document.getElementById('submitBtn');
  if (submittedIds.has(q.id)) {
    submitBtn.textContent = '✓ 已作答';
    submitBtn.disabled = true;
  } else {
    submitBtn.textContent = '✓ 确认答案';
    submitBtn.disabled = !userAnswers[q.id] || (Array.isArray(userAnswers[q.id]) && userAnswers[q.id].length === 0);
  }

  // 记忆模式提示（已自动保存）
  const actionsDiv = document.getElementById('actionsContainer');
  let clearBtn = document.getElementById('viewClearBtn');
  if (currentView === 'wrongbook' && wrongSet.size > 0) {
    if (!clearBtn) {
      clearBtn = document.createElement('button');
      clearBtn.id = 'viewClearBtn';
      clearBtn.className = 'btn btn-clear btn-sm';
      clearBtn.onclick = clearWrongBook;
      actionsDiv.appendChild(clearBtn);
    }
    clearBtn.textContent = '🗑 清空错题本';
    clearBtn.style.display = '';
  } else if (currentView === 'starred' && starredSet.size > 0) {
    if (!clearBtn) {
      clearBtn = document.createElement('button');
      clearBtn.id = 'viewClearBtn';
      clearBtn.className = 'btn btn-clear btn-sm';
      clearBtn.onclick = clearStarred;
      actionsDiv.appendChild(clearBtn);
    }
    clearBtn.textContent = '🗑 清空收藏';
    clearBtn.style.display = '';
  } else if (clearBtn) {
    clearBtn.style.display = 'none';
  }

  updateGrid();
}

function selectOption(label) {
  const q = getCurrentQ();
  if (!q || submittedIds.has(q.id)) return;

  if (q.type === 'single') {
    userAnswers[q.id] = label;
  } else {
    if (!userAnswers[q.id] || !Array.isArray(userAnswers[q.id])) {
      userAnswers[q.id] = [];
    }
    const idx = userAnswers[q.id].indexOf(label);
    if (idx >= 0) {
      userAnswers[q.id].splice(idx, 1);
      if (userAnswers[q.id].length === 0) {
        delete userAnswers[q.id];
      }
    } else {
      userAnswers[q.id].push(label);
    }
  }
  render();
}

function submitAnswer() {
  const q = getCurrentQ();
  if (!q || submittedIds.has(q.id)) return;

  const answer = userAnswers[q.id];
  if (!answer) return;

  const correctAnswer = allAnswers[q.id];
  if (!correctAnswer) {
    results[q.id] = 'wrong';
  } else if (q.type === 'single') {
    results[q.id] = answer === correctAnswer ? 'correct' : 'wrong';
  } else {
    // Multiple choice - must match exactly (order doesn't matter)
    const sorted = [...answer].sort().join('');
    const correctSorted = [...correctAnswer].sort().join('');
    results[q.id] = sorted === correctSorted ? 'correct' : 'wrong';
  }
  submittedIds.add(q.id);

  // 错题本：答错的自动加入
  if (results[q.id] === 'wrong') {
    wrongSet.add(q.id);
  } else {
    // 答对的如果之前在错题本中，移除
    wrongSet.delete(q.id);
  }

  saveState();
  render();
}

// ===== NAVIGATION =====
function nextQuestion() {
  const list = getFilteredQuestions();
  if (currentIndex < list.length - 1) {
    currentIndex++;
    render();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    render();
  }
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(el => {
    el.classList.toggle('active', el.dataset.mode === mode);
  });
  currentIndex = 0;
  saveState();
  render();
}

// ===== 收藏 / 错题本 =====
function toggleStar() {
  const q = getCurrentQ();
  if (!q) return;
  if (starredSet.has(q.id)) {
    starredSet.delete(q.id);
  } else {
    starredSet.add(q.id);
  }
  saveState();
  render();
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  currentIndex = 0;
  saveState();
  render();
}

function clearWrongBook() {
  if (wrongSet.size === 0) return;
  if (confirm('确定清空错题本吗？')) {
    wrongSet.clear();
    // 同时清除所有错题的结果记录
    Object.keys(results).forEach(id => {
      if (results[id] === 'wrong') {
        delete results[id];
        submittedIds.delete(parseInt(id));
      }
    });
    saveState();
    render();
  }
}

function clearStarred() {
  if (starredSet.size === 0) return;
  if (confirm('确定清空所有收藏吗？')) {
    starredSet.clear();
    saveState();
    render();
  }
}

// ===== GRID =====
function showGrid() {
  document.getElementById('gridOverlay').classList.add('show');
  const label = currentMode === 'single' ? '单选题' : '多选题';
  document.getElementById('gridModeLabel').textContent = `(${label})`;
  updateGrid();
}

function hideGrid() {
  document.getElementById('gridOverlay').classList.remove('show');
}

function jumpTo(index) {
  currentIndex = index;
  hideGrid();
  render();
}

function updateGrid() {
  const list = getFilteredQuestions();
  const container = document.getElementById('gridNums');
  if (!container) return;
  container.innerHTML = '';
  list.forEach((q, idx) => {
    const div = document.createElement('div');
    div.className = 'gnum';
    if (idx === currentIndex) div.classList.add('current');
    if (submittedIds.has(q.id)) {
      div.classList.add(results[q.id] === 'correct' ? 'answered' : 'wrong-q');
    }
    div.textContent = idx + 1;
    div.onclick = () => jumpTo(idx);
    container.appendChild(div);
  });
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (document.getElementById('gridOverlay').classList.contains('show')) {
    if (e.key === 'Escape') hideGrid();
    return;
  }

  const key = e.key;
  const q = getCurrentQ();
  if (!q) return;

  if (/^[a-dA-D]$/.test(key)) {
    e.preventDefault();
    selectOption(key.toUpperCase());
  } else if (key === 'Enter') {
    e.preventDefault();
    if (!submittedIds.has(q.id)) {
      submitAnswer();
    } else {
      nextQuestion();
    }
  } else if (key === 'ArrowRight') {
    e.preventDefault();
    nextQuestion();
  } else if (key === 'ArrowLeft') {
    e.preventDefault();
    prevQuestion();
  }
});

// ===== INIT =====
// Load saved state first
loadState();

// Set initial view button state
document.querySelectorAll('.view-btn').forEach(el => {
  el.classList.toggle('active', el.dataset.view === currentView);
});

// Handle overlay clicks
document.getElementById('gridOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('gridOverlay')) hideGrid();
});

render();
</script>
